<script>
// ── PWA: inyectar manifest dinámicamente ──────────────────────────────────────
(function() {
  const manifest = {
    name: "Bus Granada",
    short_name: "Bus GR",
    description: "Horarios L-225 y L-226 Granada",
    start_url: "./",
    display: "standalone",
    background_color: "#0e0f11",
    theme_color: "#0e0f11",
    orientation: "portrait",
    icons: [
      {
        src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%230e0f11'/><text x='96' y='130' font-size='110' text-anchor='middle'>🚌</text></svg>`),
        sizes: "192x192",
        type: "image/svg+xml",
        purpose: "any maskable"
      }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  document.getElementById('manifest-placeholder').setAttribute('href', url);
})();

// ── PWA: registrar Service Worker inline ──────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'bus-granada-v1';
    const FONTS = [
      'https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap'
    ];

    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(c => c.addAll(FONTS).catch(() => {}))
      );
      self.skipWaiting();
    });

    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        )
      );
      self.clients.claim();
    });

    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(cached => cached || fetch(e.request).catch(() => cached))
      );
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ===================== STATE =====================
let filterLine = "all", filterDir = "ida", filterDay = "lv";

function toMins(t) {
  const [h,m] = t.split(":").map(Number);
  return h * 60 + m;
}

function nowMins() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

function getAutoDay() {
  const d = new Date().getDay();
  if (d === 0) return "dom";
  if (d === 6) return "sab";
  return "lv";
}

function updateClock() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,"0");
  const m = String(n.getMinutes()).padStart(2,"0");
  document.getElementById("clock").textContent = h + ":" + m;
}

function getFilteredBuses() {
  const lines = filterLine === "all" ? ["225","226"] : [filterLine];
  let all = [];
  for (const line of lines) {
    const schedules = data[line][filterDay][filterDir];
    if (schedules) {
      schedules.forEach(s => all.push({ ...s, line }));
    }
  }
  all.sort((a,b) => toMins(a.dep) - toMins(b.dep));
  return all;
}

function updateNextBanner(buses) {
  const now = nowMins();
  const next = buses.find(b => toMins(b.dep) >= now);
  if (!next) {
    document.getElementById("nextTime").textContent = "—";
    document.getElementById("nextInfo").textContent = "No hay más servicios hoy";
    document.getElementById("countdownNum").textContent = "—";
    return;
  }
  const mins = toMins(next.dep) - now;
  document.getElementById("nextTime").textContent = next.dep;
  document.getElementById("nextInfo").textContent = "L-" + next.line + " · " + (filterDir === "ida" ? "desde Granada" : "desde " + (next.line === "225" ? "Pinos Puente" : "Zujaira"));
  document.getElementById("countdownNum").textContent = mins === 0 ? "0" : mins;
}

function render() {
  const buses = getFilteredBuses();
  const now = nowMins();
  const nextIdx = buses.findIndex(b => toMins(b.dep) >= now);
  updateNextBanner(buses);

  const container = document.getElementById("scheduleContainer");
  if (buses.length === 0) {
    container.innerHTML = `<div class="no-results"><span class="icon">🕐</span>No hay servicios con estos filtros</div>`;
    return;
  }

  // Group by line
  const groups = {};
  buses.forEach((b, i) => {
    if (!groups[b.line]) groups[b.line] = [];
    groups[b.line].push({ ...b, idx: i });
  });

  let html = "";
  for (const line of Object.keys(groups).sort()) {
    const lineData = data[line];
    html += `<div class="section-header">
      <span class="section-line-badge badge-${line}">L-${line}</span>
      <span class="section-title">${filterDir === "ida" ? "Desde Granada" : "Hacia Granada"}</span>
    </div>`;
    html += `<div class="schedule-list">`;

    groups[line].forEach((bus) => {
      const depMins = toMins(bus.dep);
      const isPassed = depMins < now;
      const isNext = depMins === toMins(buses[nextIdx >= 0 ? nextIdx : 0]?.dep) && bus.idx === (nextIdx >= 0 ? nextIdx : -1);

      const stopsHtml = bus.stops.map((s,i) => {
        const parts = s.split(" ");
        const time = parts.pop();
        const name = parts.join(" ");
        return `<span class="stop-chip">${name} ${time}</span>${i < bus.stops.length-1 ? '<span class="stop-arrow">›</span>' : ''}`;
      }).join("");

      html += `<div class="time-row${isPassed ? " passed" : ""}${isNext ? " is-next" : ""}">
        <div class="dep-time">${bus.dep}</div>
        <div class="stops-flow">${stopsHtml}</div>
        <div class="arr-time">${bus.arr}</div>
        ${isNext ? '<div class="next-badge">PRÓX</div>' : ""}
      </div>`;
    });

    html += `</div>`;
    if (Object.keys(groups).indexOf(line) < Object.keys(groups).length - 1) {
      html += `<div class="divider"></div>`;
    }
  }

  container.innerHTML = html;
}

});

  const btn = e.target.closest("[data-line]");
  if (!btn) return;
  filterLine = btn.dataset.line;
  document.querySelectorAll("[data-line]").forEach(b => {
    b.classList.remove("active","l225","l226");
    if (b === btn) { b.classList.add("active"); if (filterLine !== "all") b.classList.add("l"+filterLine); }
  });
  render();
});

  const btn = e.target.closest("[data-dir]");

  filterDir = btn.dataset.dir;
  document.querySelectorAll("[data-dir]").forEach(b => {
    b.classList.remove("active","dir-ida","dir-vuelta");
    if (b === btn) { b.classList.add("active"); b.classList.add("dir-"+filterDir); }
  });
  render();
});

document.getElementById("dayFilter").addEventListener("click", e => {
  const btn = e.target.closest("[data-day]");
  if (!btn) return;
  filterDay = btn.dataset.day;
  document.querySelectorAll("[data-day]").forEach(b => {
    b.classList.remove("active","day");
    if (b === btn) { b.classList.add("active","day"); }
  });
  render();
});

updateClock();
render();
setInterval(() => { updateClock(); render(); }, 30000);
